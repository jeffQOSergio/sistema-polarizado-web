<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema Polarizado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="login-box">
    <h2>🔒 Sistema Polarizado</h2>
    <p>Iniciar sesión</p>

    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>

    <p id="mensaje"></p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
