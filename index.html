<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema Polarizado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="login-box">
    <img src="J&A_POLARIZADOS_black.png" alt="Logo" class="logo">
    <h2> Sistema Polarizado</h2>
    <p>Iniciar sesión</p>

    <input type="text" id="usuario" placeholder="Usuario" required>
    <input type="password" id="password" placeholder="Contraseña" required>

    <button onclick="login()">Ingresar</button>

    <p id="mensaje"></p>
  </div>
</div>

<script>
const URL = "https://sistema-polarizado-web.onrender.com";

async function login() {
  const usuario = document.getElementById("usuario").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch(URL + "/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ usuario, password })
    });

    const data = await res.json();

    if (data.success) {
      window.location.href = "dashboard.html";
    } else {
      document.getElementById("mensaje").innerText = "Credenciales incorrectas";
    }

  } catch (error) {
    document.getElementById("mensaje").innerText = "Error conexión servidor";
  }
}
</script>

</body>
</html>
