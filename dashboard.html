<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sistema Polarizado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <div class="sidebar">
    <img src="J&A_POLARIZADOS_white.png" class="logo-dashboard">
<h2>J&A Polarizados</h2>
    <ul>
      <li onclick="mostrar('inicio')">🏠 Inicio</li>
      <li onclick="mostrar('clientes')">👤 Clientes</li>
      <li onclick="mostrar('servicios')">🛠 Servicios</li>
      <li onclick="mostrar('reportes')">📊 Reportes</li>
      <li onclick="logout()">🚪 Salir</li>
    </ul>
  </div>

  <div class="contenido">

    <div id="inicio" class="seccion">
      <h1>Bienvenido al sistema</h1>
      <p>Gestión de servicios de polarizado vehicular</p>
    </div>

    <div id="clientes" class="seccion" style="display:none;">
      <h1>Registrar Cliente</h1>

      <form id="formCliente">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="telefono" placeholder="Teléfono" required>
        <input type="text" id="placa" placeholder="Placa Vehículo" required>
      
        <button type="submit">Guardar Cliente</button>
      </form>
      
      <p id="mensaje"></p>

    </div>

    <div id="servicios" class="seccion" style="display:none;">
      <h1>Servicios</h1>
      <p>Aquí irá el registro de polarizados</p>
    </div>

    <div id="reportes" class="seccion" style="display:none;">
      <h1>Reportes</h1>
      <p>Aquí irán las estadísticas</p>
    </div>

  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
